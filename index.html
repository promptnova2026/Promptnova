<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PromptNova</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#0d1117;
color:white;
}

header{
background:#6c2bd9;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.hero{
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:42px;
margin-bottom:15px;
}

.hero p{
color:#cccccc;
font-size:18px;
margin-bottom:30px;
}

.btn{
display:inline-block;
background:#ff0066;
color:white;
padding:14px 28px;
border-radius:10px;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

.btn:hover{
background:#d60055;
}
 .like-btn{
  margin-top:10px;
  background:#007bff;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.like-btn:hover{
  background:#0056b3;
}
</style>
</head>

<body>

<header>
🔥 PromptNova
</header>
<section class="hero">
<h1>🖼️ AI Art Prompts</h1>

<p>Create stunning AI-edited photos with ChatGPT and Gemini. Copy a prompt and create amazing AI photos.</p>

<input
id="searchBox"
type="text"
placeholder="🔍 Search AI Prompts..."
style="width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;margin-top:20px;"
>
 
<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;">

<button class="btn" data-category="all">🔥 Trending</button>
<button class="btn" data-category="ai">🖼️ AI Art</button>
<button class="btn" data-category="portrait">👤 Portrait</button>
<button class="btn" data-category="couple">❤️ Couple</button>
<button class="btn" data-category="sports">⚽ Sports</button>

</div>
</section>
 <section style="padding:20px;">

<div class="prompt-card" 
</div>

</section> <footer style="background:#161b22;padding:30px;text-align:center;margin-top:40px;">
<h3>🚀 PromptNova</h3>
<p style="color:#aaa;">
The best free AI Prompt Library for ChatGPT, Midjourney and more.
</p>

<p style="margin-top:15px;color:#777;">
© 2026 PromptNova. All Rights Reserved.
</p>
</footer>

<script>
const copyButtons = document.querySelectorAll(".copy-btn");
const likeButtons = document.querySelectorAll(".like-btn");

likeButtons.forEach(button => {
  let count = 0;

  button.addEventListener("click", function () {
    count++;
    this.innerHTML = "👍 Like " + count;
  });
});

copyButtons.forEach(button=>{
button.addEventListener("click",function(){
const prompt=this.parentElement.querySelector("p").innerText;
navigator.clipboard.writeText(prompt);
this.innerHTML="✅ Copied!";
setTimeout(()=>{
this.innerHTML="❤️ Copy Prompt";
},2000);
});
});
 const searchBox = document.getElementById("searchBox");
const cards = document.querySelectorAll(".prompt-card");

searchBox.addEventListener("keyup", function () {
  const text = this.value.toLowerCase();

  cards.forEach(card => {
    const content = card.innerText.toLowerCase();

    if (content.includes(text)) {
      card.style.display = "block";
    } else {
      card.style.display = "none";
    }
  });
});
</script>

</body>
</html>
